name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # keyless cosign signing via OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: sigstore/cosign-installer@v3
      - name: build cross-platform artifacts
        run: make dist VERSION=${{ github.ref_name }}
      - name: sign checksums (keyless)
        run: cosign sign-blob --yes --bundle dist/checksums.txt.cosign.bundle dist/checksums.txt
      - name: publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/checksums.txt.cosign.bundle
